name: "Security Scan"

on:
  schedule:
    - cron: "0 3 * * 1"
  push:
    branches: [main, uat]
  workflow_dispatch:

concurrency:
  group: "security-scan-${{ github.ref }}"
  cancel-in-progress: false

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  codeql:
    name: "CodeQL - SAST (Swift)"
    runs-on: macos-15
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          queries: security-extended, security-and-quality

      - name: Build for CodeQL Analysis
        run: |
          xcodebuild \
            -project Verbum.xcodeproj \
            -scheme Verbum \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            clean build \
            CODE_SIGNING_ALLOWED=NO

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:swift"
          upload: true

  dependency-review:
    name: "Dependency Review"
    if: ${{ github.event_name == 'push' && github.event.before != '0000000000000000000000000000000000000000' }}
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          base-ref: ${{ github.event.before }}
          head-ref: ${{ github.sha }}
          fail-on-severity: high

  secret-scan:
    name: "Secret Leak Detection"
    runs-on: ubuntu-22.04
    timeout-minutes: 15

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Scan
        id: gitleaks
        continue-on-error: true
        uses: gitleaks/gitleaks-action@v2
        with:
          args: detect --source . --redact --report-format sarif --report-path ${{ runner.temp }}/gitleaks.sarif

      - name: Ensure SARIF Exists
        if: always()
        run: |
          if [ ! -f "${{ runner.temp }}/gitleaks.sarif" ]; then
            cat > "${{ runner.temp }}/gitleaks.sarif" <<'EOF'
            {
              "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
              "version": "2.1.0",
              "runs": []
            }
            EOF
          fi

      - name: Upload Gitleaks SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ runner.temp }}/gitleaks.sarif

      - name: Fail on Detected Leaks
        if: ${{ steps.gitleaks.outcome == 'failure' }}
        run: |
          echo "Gitleaks detected potential secrets. See uploaded SARIF results."
          exit 1
