name: "Deploy - SIT"

on:
  push:
    branches: [sit]
  workflow_dispatch:
    inputs:
      release_notes:
        description: "Release notes for SIT"
        required: false
        default: "SIT build for internal integration testing."

concurrency:
  group: "deploy-sit"
  cancel-in-progress: false

permissions:
  contents: read

env:
  XCODE_SCHEME: "Verbum"
  XCODE_PROJECT: "Verbum.xcodeproj"

jobs:
  validate:
    name: "Pre-Deploy Validation"
    runs-on: macos-15
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - name: Engineering Guidelines
        run: bash Scripts/Verification/verify_verbum_guidelines.sh

      - name: Unit Tests
        run: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 15' \
            -derivedDataPath build \
            test \
            CODE_SIGNING_ALLOWED=NO

  build-and-archive:
    name: "Build and Archive SIT"
    needs: validate
    runs-on: macos-15
    timeout-minutes: 40
    environment: sit

    steps:
      - uses: actions/checkout@v4

      - name: Build simulator app artifact
        run: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -destination 'platform=iOS Simulator,OS=latest,name=iPhone 15' \
            -derivedDataPath build \
            clean build \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload SIT Artifact
        uses: actions/upload-artifact@v4
        with:
          name: "verbum-ios-sit-${{ github.run_number }}"
          path: "build/Build/Products/Debug-iphonesimulator/Verbum.app"
          retention-days: 21
