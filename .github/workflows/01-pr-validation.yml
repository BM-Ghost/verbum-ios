name: "PR Validation"

on:
  pull_request:
    branches: [dev, sit, uat, main]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: "pr-validation-${{ github.event.pull_request.number }}-${{ github.event.action }}"
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  XCODE_SCHEME: "Verbum"
  XCODE_PROJECT: "Verbum.xcodeproj"

jobs:
  branch-name:
    name: "Branch Naming Convention"
    if: ${{ !github.event.pull_request.draft && github.event.pull_request.base.ref == 'dev' }}
    runs-on: macos-15
    timeout-minutes: 5

    steps:
      - name: Validate branch name
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          echo "Branch: $BRANCH"
          if [[ "$BRANCH" =~ ^(feature|ft)-.+ ]]; then
            echo "Branch name is valid."
          else
            echo "Branch name '$BRANCH' does not match required convention."
            echo "Required: feature-<description> or ft-<description>"
            exit 1
          fi

  guidelines:
    name: "Engineering Guidelines"
    if: ${{ !github.event.pull_request.draft }}
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Verify Verbum Engineering Guidelines
        run: bash Scripts/Verification/verify_verbum_guidelines.sh

  unit-tests:
    name: "Unit Tests"
    if: ${{ !github.event.pull_request.draft }}
    runs-on: macos-15
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - name: Resolve test simulator destination
        run: |
          SIMULATOR_ID=$(xcrun simctl list devices available iOS | grep -E 'iPhone|iPad' | grep -Eo '[0-9A-F-]{36}' | head -n 1)
          if [[ -z "$SIMULATOR_ID" ]]; then
            echo "No available iOS simulator found on runner."
            exit 1
          fi
          echo "Using simulator id: $SIMULATOR_ID"
          echo "TEST_DESTINATION=platform=iOS Simulator,id=$SIMULATOR_ID" >> "$GITHUB_ENV"

      - name: Run xcodebuild tests
        run: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -destination "$TEST_DESTINATION" \
            -derivedDataPath build \
            test \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: "test-results-pr${{ github.event.pull_request.number }}"
          path: "build/Logs/Test"
          retention-days: 7

  build-check:
    name: "Build Verification"
    if: ${{ !github.event.pull_request.draft }}
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Build app for simulator
        run: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            clean build \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v7
        with:
          name: "verbum-ios-simulator-pr${{ github.event.pull_request.number }}"
          path: "build/Build/Products/Debug-iphonesimulator/Verbum.app"
          retention-days: 3

  dependency-review:
    name: "Dependency Review"
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0, SSPL-1.0

  pr-gate:
    name: "PR Gate"
    needs: [branch-name, guidelines, unit-tests, build-check, dependency-review]
    if: always() && !github.event.pull_request.draft
    runs-on: ubuntu-22.04
    steps:
      - name: Evaluate required job results
        env:
          STATUSES: ${{ join(needs.*.result, ' ') }}
        run: |
          echo "Job statuses: $STATUSES"
          if echo "$STATUSES" | grep -qE 'failure|cancelled'; then
            echo "One or more required validation jobs failed."
            exit 1
          fi
          echo "All PR validation checks passed."
