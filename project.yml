name: Verbum
options:
  bundleIdPrefix: com.verbum
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  groupSortPosition: top
settings:
  SWIFT_VERSION: "5.10"
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: "1"
targets:
  Verbum:
    type: application
    platform: iOS
    sources:
      - path: Verbum
        type: group
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.verbum.app
      GENERATE_INFOPLIST_FILE: NO
      INFOPLIST_FILE: Verbum/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
